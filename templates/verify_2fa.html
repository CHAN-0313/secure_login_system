{% extends 'base.html' %}
{% block content %}
<div class="row justify-content-center">
<div class="col-md-5">
<div class="card p-4">
<h3 class="mb-3">Two-Factor Verification</h3>
<p>Enter the 6-digit code from your authenticator app.</p>
<form method="POST">
  {{ form.hidden_tag() }}
  <div class="mb-3">{{ form.otp(class="form-control", placeholder="123456") }}</div>
  {{ form.submit(class="btn btn-primary w-100") }}
</form>
</div>
</div>
</div>
{% endblock %}
