{% extends 'base.html' %}
{% block content %}
<h3>Activity Logs</h3>
<table class="table table-striped bg-white mt-3">
<thead><tr><th>Action</th><th>IP Address</th><th>Date</th></tr></thead>
<tbody>
{% for log in logs %}
<tr><td>{{ log.action }}</td><td>{{ log.ip_address }}</td><td>{{ log.created_at.strftime('%Y-%m-%d %H:%M:%S') }}</td></tr>
{% else %}
<tr><td colspan="3">No activity yet.</td></tr>
{% endfor %}
</tbody>
</table>
{% endblock %}
