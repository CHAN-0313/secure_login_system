<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Secure Login System</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
<style>
body{background:#f4f6f9;}
.card{border:none;border-radius:12px;box-shadow:0 2px 10px rgba(0,0,0,.08);}
.navbar{box-shadow:0 2px 6px rgba(0,0,0,.06);}
</style>
</head>
<body>
<nav class="navbar navbar-expand navbar-dark bg-dark px-4">
  <a class="navbar-brand" href="/">🔒 SecureLogin</a>
  {% if current_user.is_authenticated %}
  <div class="ms-auto">
    <a class="text-light me-3" href="{{ url_for('dashboard') }}">Dashboard</a>
    <a class="text-light me-3" href="{{ url_for('activity_logs') }}">Activity Logs</a>
    <a class="text-light" href="{{ url_for('logout') }}">Logout</a>
  </div>
  {% endif %}
</nav>
<div class="container mt-5">
  {% with messages = get_flashed_messages(with_categories=true) %}
    {% if messages %}
      {% for category, msg in messages %}
        <div class="alert alert-{{ category }}">{{ msg }}</div>
      {% endfor %}
    {% endif %}
  {% endwith %}
  {% block content %}{% endblock %}
</div>
</body>
</html>
